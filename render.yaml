# Blueprint do Render — UM ÚNICO serviço (Opção A).
# O Express serve a API E o frontend compilado (client/dist) na mesma origem.
# A base de dados é Postgres EXTERNO (Neon/Supabase) -> já não é preciso disco,
# e o plano gratuito do Render serve perfeitamente (os dados vivem no Postgres).
#
# Como usar: Render -> New -> Blueprint -> aponta ao repositório.
# Depois define os segredos DATABASE_URL e (opcional) ANTHROPIC_API_KEY no painel.
services:
  - type: web
    name: despesas
    runtime: node
    rootDir: .
    region: frankfurt
    plan: free
    buildCommand: npm --prefix client install && npm --prefix client run build && npm --prefix server install
    startCommand: npm --prefix server start
    healthCheckPath: /api/saude
    envVars:
      - key: DATABASE_URL
        sync: false # connection string do Neon/Supabase (secreto)
      - key: ANTHROPIC_API_KEY
        sync: false # opcional (sem isto, a leitura de talões usa OCR no telemóvel)
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
